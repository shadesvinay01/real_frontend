version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: sales_os_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sales_os
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sales_os_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  db_data:
